name: environments

on:
  push:
    branches:
      - main
env:
  APP_NAME: myapp
jobs:
  environments:
    env:
      ENVIRONMENT: staging
    runs-on: ubuntu-latest
    steps:
      - name: print variables
        env:
          VERSION: 1.0.0
        run: |
          echo "App-Env: $APP_NAME"
          echo "Environment: $ENVIRONMENT"
          echo "Version: $VERSION:"
          
