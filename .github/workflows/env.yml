name: environment

on:
  push:
    branches: 
      - main
env:
  APP_NAME: myapp

jobs:
  environment:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: staging
    steps:
      - name: print environment variables
        env: 
          VERSION: 1.0.0        
        run: |
        echo "APP_NAME':' $APP_NAME"
        echo "ENVIRONMENT':' $ENVIRONMENT"
        echo "VERSION':' $VERSION"
