name: manaual-trigger

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'This is to choos environment'
        default: 'staging'
        required: true
        type: choice
        options:
          - staging
          - production
          - dev
jobs:
  select-env:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: print environment
        run: echo "The environment is ':' ${{ github.event.inputs.environment }}"
  
