name: matrix

on:
  push:
    branches: [main]

jobs:
  matrix-job:
    strategy:
      matrix:
        version: ["3.10", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
  
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}
      
      - name: print version
        run: python --version
