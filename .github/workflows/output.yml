name: outputs

on:
  push:
    branches:
      - main


jobs:
  print-date:
    runs-on: ubuntu-latest

    outputs:
      today: ${{ steps.set-date.outputs.today }}

    steps:
      - name: set today's date
        id: set-date
        run: echo "today=$(date)" >> $GITHUB_OUTPUT

  read-output:
    runs-on: ubuntu-latest
    needs:
      print-date
    steps:
      - name: read output
        run: echo "Today's date is ${{ needs.print-date.outputs.today }}"
